version: '3.8'
services:
  traefik:
    image: traefik:latest
    network_mode: host
    command:
      - --api.dashboard=false
      - --api.insecure=false
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=TU_CORREO@DOMINIO.COM
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    restart: unless-stopped
    volumes:
      - traefik-letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  web:
    build: .
    container_name: marmoles-villalobos-web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./css:/usr/share/nginx/html/css
      - ./assets/img:/usr/share/nginx/html/assets/img
      - ./assets/video:/usr/share/nginx/html/assets/video
      - ./js:/usr/share/nginx/html/js
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.marmolesvillalobos.rule=Host(`marmolesvillalobos.com`)"
      - "traefik.http.routers.marmolesvillalobos.entrypoints=web,websecure"
      - "traefik.http.routers.marmolesvillalobos.tls.certresolver=letsencrypt"
      - "traefik.http.services.marmolesvillalobos.loadbalancer.server.port=80"

volumes:
  traefik-letsencrypt: